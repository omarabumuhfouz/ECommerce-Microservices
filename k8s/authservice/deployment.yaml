apiVersion: apps/v1
kind: Deployment
metadata:
  name: authservice
  namespace: ecommerce
spec:
  replicas: 1

  selector:
    matchLabels:
      app: authservice

  template:
    metadata:
      labels:
        app: authservice

    spec:
      containers:
      - name: authservice

        image: omarabumuhfouz1/auth-service:latest

        ports:
        - containerPort: 7000