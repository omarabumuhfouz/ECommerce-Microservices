name: Payment Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "src/PaymentService/**"
      - "tests/PaymentService.Tests/**"

  pull_request:
    branches:
      - main
    paths:
      - "src/PaymentService/**"
      - "tests/PaymentService.Tests/**"

concurrency:
  group: payment-service
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"
  PROJECT_PATH: src/PaymentService/PaymentService.csproj
  TEST_PROJECT_PATH: tests/PaymentService.Tests/PaymentService.Tests.csproj
  IMAGE_NAME: your-dockerhub-username/payment-service

jobs:

# ==========================================
# Restore Dependencies
# ==========================================
  restore:
    name: Restore Dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

# ==========================================
# Build
# ==========================================
  build:
    name: Build
    needs: restore
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

# ==========================================
# Unit Tests
# ==========================================
  tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Run Unit Tests
        run: |
          dotnet test ${{ env.TEST_PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            --verbosity normal

# ==========================================
# Docker Build & Push
# ==========================================
  docker:
    name: Build & Push Docker Image
    needs: tests

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=runnumber

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/PaymentService/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}