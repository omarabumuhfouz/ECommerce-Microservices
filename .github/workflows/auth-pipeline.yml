name: Auth Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "src/AuthService/**"
      - "tests/AuthService.Tests/**"

  pull_request:
    branches:
      - main
    paths:
      - "src/AuthService/**"
      - "tests/AuthService.Tests/**"

  workflow_dispatch:

concurrency:
  group: auth-service
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"
  PROJECT_PATH: src/AuthService/AuthService.Api/AuthService.Api.csproj
  TEST_PROJECT_PATH: tests/AuthService.Tests/AuthService.Tests.csproj
  IMAGE_NAME: omarabumuhfouz1/auth-service


# ============================
# JOB 1: RESTORE + BUILD
# ============================
jobs:
  build:
    name: Build Auth Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ============================
      # NUGET CACHE (IMPORTANT)
      # ============================
      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore Dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build Project
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore


# ============================
# JOB 2: TESTS
# ============================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Run Tests
        run: |
          dotnet test ${{ env.TEST_PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            --verbosity normal


# ============================
# JOB 3: DOCKER BUILD + PUSH
# ============================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ============================
      # LOGIN TO DOCKER HUB
      # ============================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ============================
      # METADATA TAGGING (PRO LEVEL)
      # ============================
      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=raw,value=${{ github.run_number }}

      # ============================
      # BUILD + PUSH IMAGE
      # ============================
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/AuthService/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}