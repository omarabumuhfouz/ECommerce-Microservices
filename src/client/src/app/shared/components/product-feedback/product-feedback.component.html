<section class="reviews-section" id="reviews">
  <h2 class="section-title">Customer Reviews</h2>
  <div class="reviews-header">
    <div class="overall-rating">
      <span class="big-rating">{{ averageRating }}</span>
      <div>
        <app-star-rating [rating]="averageRating" [count]="reviews.length" [showCount]="false" />
        <span class="review-count">Based on {{ reviews.length }} reviews</span>
      </div>
    </div>
    <button class="btn-primary">Write a Review</button>
  </div>

  <div class="reviews-list">
    @for (review of reviews; track review.id) {
      <div class="review-card">
        <div class="review-header">
          <img [src]="review.avatar" [alt]="review.author" class="review-avatar">
          <div class="review-meta">
            <span class="review-author">{{ review.author }}</span>
            <span class="review-date">{{ review.date | date:'mediumDate' }}</span>
          </div>
        </div>
        <div class="review-stars">
          <app-star-rating [rating]="review.rating" [count]="0" [showCount]="false" />
        </div>
        <h4 class="review-title">{{ review.title }}</h4>
        <p class="review-body">{{ review.body }}</p>
        <div class="review-helpful">
          <button class="btn-helpful">👍 Helpful ({{ review.helpful }})</button>
        </div>
      </div>
    } @empty {
      <p class="no-reviews">No reviews yet. Be the first to review this product!</p>
    }
  </div>
</section>
