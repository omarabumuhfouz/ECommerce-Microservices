syntax = "proto3";

option csharp_namespace = "Contracts.Product";

package product;

service ProductProtoService {
    rpc GetProductById(GetProudctByIdRequest) returns (ProductModel);
    rpc DecreaseStock(DecreaseStockRequest) returns (ModelResponse);
    rpc GetProducsNamesByIds(GetProducsNamesByIdsRequest) returns (GetProducsNamesByIdsResponse);
    
    rpc GetProductsByIds(GetProductsByIdsRequest) returns (GetProductsByIdsResponse);
}

message GetProductsByIdsRequest {
    repeated string ids = 1;
}

message GetProductsByIdsResponse {
    repeated ProductModel products = 1;
}

message GetProudctByIdRequest {
    string id = 1;
}

message ProductModel {
    string id = 1;
    string name = 2;
    string price = 3; 
    int32 stock_quantity = 4;
    bool is_available = 5;
    int32 discount_percentage = 6;
}

message DecreaseStockRequest {
    string product_id = 1;
    int32 quantity = 2;
}

message ModelResponse {
    bool success = 1;
    string message = 2;
}

message GetProducsNamesByIdsRequest {
    repeated string product_ids = 1;
}

message GetProducsNamesByIdsResponse {
    repeated ProductNameModel products_names = 1;
}

message ProductNameModel {
    string product_id = 1;
    string name = 2;
}